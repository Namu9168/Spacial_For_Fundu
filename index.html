<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Fundu 💖</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
overflow:hidden;
background:linear-gradient(-45deg,#ffe6f0,#e6f7ff,#fff0f5);
background-size:400% 400%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
text-align:center;
margin-top:120px;
}

h1{
font-size:3rem;
color:#ff4da6;
animation:float 2s infinite;
}

@keyframes float{
50%{transform:translateY(-10px)}
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

.cake{
font-size:100px;
cursor:pointer;
margin-top:40px;
display:none;
}

</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" src="music1.mp3" loop></audio>

<!-- 🎉 Cake Music -->
<audio id="cakeMusic" src="music2.mp3"></audio>

<div class="container">

<h1>Happy Birthday Fundu 💖</h1>
<p>Hey Pooja… today is YOUR day ✨</p>

<button onclick="startExperience()">Start Surprise 💕</button>

<div class="cake" id="cake">🎂</div>

<p id="msg"></p>

</div>

<script>

const bgMusic = document.getElementById("bgMusic");
const cakeMusic = document.getElementById("cakeMusic");

function startExperience(){
    bgMusic.play();

    document.getElementById("cake").style.display="block";

    gsap.from("#cake",{scale:0, duration:1, ease:"back.out"});
}

// 🎂 Cake Click
document.getElementById("cake").addEventListener("click",()=>{

    bgMusic.pause();
    cakeMusic.play();

    document.getElementById("msg").innerHTML =
    "Yaaayyy 🎉 Happy Birthday Fundu 💖<br>You deserve all happiness in the world ✨<br><br>Click below 👇";

    // Floating hearts 💖
    for(let i=0;i<40;i++){
        let el=document.createElement("div");
        el.innerHTML="💖";
        el.style.position="absolute";
        el.style.left=Math.random()*100+"vw";
        el.style.top=Math.random()*100+"vh";
        el.style.fontSize="20px";
        document.body.appendChild(el);

        gsap.to(el,{
            y:-500,
            opacity:0,
            duration:3,
            onComplete:()=>el.remove()
        });
    }

    // Add next button
    let nextBtn = document.createElement("button");
    nextBtn.innerText="Continue 💕";
    nextBtn.style.marginTop="20px";

    nextBtn.onclick = ()=>{
        window.location.href="cause.html";
    };

    document.querySelector(".container").appendChild(nextBtn);

});

</script>

</body>
</html>
