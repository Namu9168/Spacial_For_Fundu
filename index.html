<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundu 💖 Cinematic</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:white;
}

/* VIDEO */
#bgVideo {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index:-40;
}

/* Romantic Pink Overlay */
#pinkOverlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,120,200,0.25), rgba(0,0,0,0.4));
    z-index:-30;
}

/* Sparkles */
.sparkle{
    position:fixed;
    width:4px;height:4px;
    background:white;
    border-radius:50%;
    animation:floatUp 5s linear forwards;
}
@keyframes floatUp {
    to { transform:translateY(-120vh); opacity:0; }
}

/* MAIN CONTENT */
.container{
    text-align:center;
    margin-top:70px;
}

#chatArea{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* Chat bubble FIX */
.chat{
    background:#dcf8c6;
    color:black;
    padding:10px 14px;
    margin:10px 0;
    border-radius:20px;
    opacity:0;
    transform:translateY(30px);
    max-width: fit-content;
    display: inline-block;
    text-align:left;
    font-size:17px;
}

/* Cake */
#cake{
    font-size:120px;
    display:none;
    opacity:0;
    cursor:pointer;
    margin-top:20px;
}

/* Popup Overlay */
#popupOverlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    top: 0;
    left: 0;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

/* Popup Box */
#popupBox {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    color: #ff4da6;
    font-size: 22px;
    max-width: 80%;
    box-shadow: 0 0 25px rgba(255,100,200,0.8);
    transform: scale(0.7);
    opacity: 0;
}

/* Popup Button */
#popupBtn {
    margin-top: 15px;
    padding: 10px 22px;
    background: #ff4da6;
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
}
#popupBtn:hover {
    background: #ff1f90;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video id="bgVideo" autoplay muted loop playsinline>
    <source src="video2.mp4" type="video/mp4">
</video>

<div id="pinkOverlay"></div>

<!-- AUDIO -->
<audio id="music" loop>
    <source src="music1.mpeg" type="audio/mpeg">
</audio>

<div class="container">
    <h1>Happy Birthday Fundu 💖</h1>

    <div id="chatArea"></div>

    <div id="cake">🎂</div>
</div>

<!-- ✅ POPUP -->
<div id="popupOverlay">
    <div id="popupBox">
        <p id="popupMessage">Happyyyy Birthday 💖<br>You are amazing ✨</p>
        <button id="popupBtn">Next Surprise 💕</button>
    </div>
</div>

<script>

/* ✅ AUTOPLAY MUSIC FIX */
window.onload = () => {
    const music = document.getElementById("music");
    music.volume = 0;
    music.play().catch(()=>{});
    setTimeout(() => {
        gsap.to(music, { volume: 1, duration: 3 });
    }, 600);
};
const music = document.getElementById("music");

function startMusic() {
    music.play().then(() => {
        console.log("Music started");
    }).catch(err => {
        console.log("Error:", err);
    });
}

/* ANY user interaction */
document.body.addEventListener("click", startMusic, { once: true });
document.body.addEventListener("touchstart", startMusic, { once: true });
/* Sparkles */
setInterval(() => {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = "100vh";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 5000);
}, 200);

/* CHAT */
const msgs = [
"Hi Fundu 🎀",
"Today is your special day 💖",
"You deserve everything ✨",
"Stay happy always 🌸",
"Something for you 🎂"
];

let i = 0;

function showMsg() {
    if (i < msgs.length) {
        let b = document.createElement("div");
        b.className = "chat";
        b.innerText = msgs[i];
        document.getElementById("chatArea").appendChild(b);

        gsap.to(b, { opacity: 1, y: 0 });
        i++;

        if (i === msgs.length) {
            setTimeout(showCake, 2000);
        }
    }
}
setInterval(showMsg, 2000);

/* Show Cake */
function showCake() {
    document.getElementById("cake").style.display = "block";
    gsap.to("#cake", { opacity: 1, scale: 1.1 });
}

/* ✅ POPUP ON CAKE CLICK */
document.getElementById("cake").onclick = () => {
    const ov = document.getElementById("popupOverlay");
    ov.style.display = "flex";

    gsap.to("#popupBox", {
        opacity: 1,
        scale: 1,
        duration: 0.8,
        ease: "elastic.out(1, 0.5)"
    });
};

/* ✅ Next Button */
document.getElementById("popupBtn").onclick = () => {
    window.location.href = "cause.html";
};

</script>

</body>
</html>
