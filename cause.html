<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why You're Special 🌸✨</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Quicksand:wght@500&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Quicksand', sans-serif;

    /* Soft animated pastel background */
    background: linear-gradient(120deg, #ffe6f2, #f7e8ff, #e3faff, #fff2e6);
    background-size: 400% 400%;
    animation: bgAnimate 15s ease infinite;

    padding: 2rem;
}

/* Background animation */
@keyframes bgAnimate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* FLOATING EMOJIS (flowers, cakes, confetti) */
.floating {
    position: fixed;
    bottom: -30px;
    font-size: 2rem;
    animation: floatUp 6s linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
}

.container {
    max-width: 850px;
    margin: auto;
    text-align: center;
}

/* Heading */
h1 {
    font-family: 'Bubblegum Sans', cursive;
    font-size: 2.8rem;
    color: #ff66aa;
    margin-bottom: 2rem;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-7px); }
}

/* Reason cards */
.reason-card {
    background: white;
    border-radius: 18px;
    padding: 1.4rem;
    margin: 1rem 0;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    font-size: 1.1rem;
    transition: 0.3s;
}

.reason-card:hover {
    transform: translateY(-6px);
}

/* Main button */
#btn {
    background: linear-gradient(45deg, #ff66aa, #ff99cc);
    border: none;
    border-radius: 40px;
    padding: 1rem 2.2rem;
    color: white;
    font-size: 1.2rem;
    margin-top: 2rem;
    cursor: pointer;
    transition: 0.3s;
}

#btn:hover {
    transform: scale(1.12);
}

/* Counter */
.counter {
    margin-top: 1rem;
    color: #ff66aa;
    font-size: 0.95rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>Why Fundu is My Favorite Person 🌸💖</h1>

    <div id="reasons-container"></div>

    <button id="btn">Click Here 💕</button>

    <div class="counter" id="counter"></div>
</div>

<script>

/* CELEBRATION EMOJIS */
const floatEmojis = ["🌸","🌼","🎉","🎀","🌺","🎂","🍰","✨"];

function createFloatingEmoji() {
    const emoji = document.createElement("div");
    emoji.className = "floating";
    emoji.innerText = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(emoji);

    setTimeout(() => emoji.remove(), 7000);
}

setInterval(createFloatingEmoji, 600);



/* REASONS LIST */
const reasons = [
"Fundu, tu majhi best friend nahi… tu majhi full vibe ahes 🌸",
"Tuzya sobat aslo ki sagla stress dissolve hoto ✨",
"Tuzya hasi mule full day bright hoto ☀️",
"Tu aahes mhanun life khup mast ahe 💕",
"Tu majhya life madhli MOST important person ahes ❤️"
];

let index = 0;

const container = document.getElementById("reasons-container");
const btn = document.getElementById("btn");
const counter = document.getElementById("counter");

btn.addEventListener("click", () => {

    if (index < reasons.length) {

        let card = document.createElement("div");
        card.className = "reason-card";
        card.innerHTML = reasons[index];

        container.appendChild(card);

        gsap.from(card, {
            opacity: 0,
            y: 40,
            duration: 0.6
        });

        counter.innerText = `Reason ${index + 1} of ${reasons.length}`;

        index++;

        if (index === reasons.length) {
            btn.innerText = "Enter Our Story 💫";
            btn.onclick = () => {
                gsap.to("body", {
                    opacity: 0,
                    duration: 1,
                    onComplete: () => {
                        window.location.href = "story.html";
                    }
                });
            };
        }

    } else {
        window.location.href = "story.html";
    }
});

</script>

</body>
</html>
