<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why You're My Best Friend 💖</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Comic+Neue:wght@700&family=Quicksand:wght@500&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
cursor:none;
}

body{
min-height:100vh;
background:linear-gradient(-45deg,#ffe6e6,#e6e6ff,#ffebf5);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
font-family:'Quicksand',sans-serif;
overflow-x:hidden;
padding:2rem;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.custom-cursor{
width:30px;
height:30px;
position:fixed;
pointer-events:none;
z-index:9999;
}

.container{
max-width:900px;
margin:auto;
text-align:center;
}

h1{
font-family:'Bubblegum Sans',cursive;
font-size:2.8rem;
color:#ff69b4;
margin-bottom:2rem;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
50%{transform:translateY(-8px);}
}

.reason-card{
background:white;
border-radius:20px;
padding:1.5rem;
margin:1rem 0;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.reason-card:hover{
transform:translateY(-5px);
}

.reason-text{
font-size:1.1rem;
}

button{
background:linear-gradient(45deg,#ff69b4,#ff99cc);
border:none;
border-radius:50px;
padding:1rem 2rem;
font-size:1.1rem;
color:white;
margin-top:2rem;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

.counter{
margin-top:1rem;
color:#ff69b4;
font-size:0.9rem;
}

</style>
</head>

<body>

<div class="container">

<h1>Why Fundu is My Favorite Person 💖</h1>

<div id="reasons-container"></div>

<button id="btn">Click Here 💕</button>

<div class="counter" id="counter"></div>

</div>

<script>

const reasons = [
"Fundu, tu majhi best friend nahi... tu majhi vibe ahes 💖",
"Tuzya sobat aslo ki sagla stress vanish hoto ✨",
"Tuzya hasi mule full day bright hoto ☀️",
"Tu aahes mhanun life mast ahe 💕",
"Tu majhya life madhli most important person ahes ❤️"
];

let index = 0;

const container = document.getElementById("reasons-container");
const btn = document.getElementById("btn");
const counter = document.getElementById("counter");

btn.addEventListener("click",()=>{

if(index < reasons.length){

let card = document.createElement("div");
card.className = "reason-card";
card.innerHTML = `<div class="reason-text">${reasons[index]}</div>`;

container.appendChild(card);

gsap.from(card,{
opacity:0,
y:40,
duration:0.5
});

counter.innerText = `Reason ${index+1} of ${reasons.length}`;

index++;

if(index === reasons.length){
btn.innerText = "Enter Our Story 💫";

btn.onclick = ()=>{
gsap.to("body",{
opacity:0,
duration:1,
onComplete:()=>{
window.location.href="story.html";
}
});
};
}

}else{
window.location.href="story.html";
}

});

</script>

</body>
</html>
