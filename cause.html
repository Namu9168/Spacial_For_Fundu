<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundu Chat 🩷</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500&family=Poppins:wght@600&display=swap');

body{
    margin:0;
    background:linear-gradient(120deg,#ffeaf4,#f8e8ff,#e5f7ff);
    background-size:400% 400%;
    animation:bgShift 14s infinite ease;
    font-family:'Quicksand',sans-serif;
    overflow-x:hidden;
    padding:20px;
}

/* Background Animation */
@keyframes bgShift {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* WhatsApp Chat Style */
.chat-box{
    max-width:600px;
    margin:auto;
}

.chat-bubble{
    background:#dcf8c6;
    padding:12px 18px;
    margin:12px 0;
    border-radius:15px 15px 0 15px;
    width:fit-content;
    font-size:1.1rem;
    opacity:0;
    transform:translateY(25px);
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

/* Main Button */
button{
    display:block;
    margin:25px auto;
    padding:14px 24px;
    background:#25D366;
    color:white;
    font-size:1.1rem;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.1);
}

/* Floating Emojis */
.float{
    position:fixed;
    bottom:-40px;
    font-size:2rem;
    animation:floatUp 6s linear infinite;
    pointer-events:none;
}
@keyframes floatUp{
    0%{transform:translateY(0) rotate(0);opacity:1;}
    100%{transform:translateY(-120vh) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<!-- Background Music -->
<audio id="music" autoplay loop>
    <source src="YOUR-MUSIC-LINK.mp3" type="audio/mpeg">
</audio>

<script>
// Try to force autoplay (some browsers need quick touch)
document.addEventListener('click',()=>{
    document.getElementById("music").play();
},{once:true});
</script>

<div class="chat-box" id="chatBox"></div>

<button id="btn">Next Message 💬</button>

<script>

const messages = [
    "Fundu 😄 tumhi majhi BESTEST vibe ahat 🌸",
    "Tuzya sobat aslo ki world changla वाटतं 💕",
    "Tuzya message mule दिवसभर हसू येतं 😄✨",
    "Tu माझ्या लाइफमध्ये आहेस… that’s the biggest blessing ❤️",
    "Ok आता special page मध्ये चला 💫"
];

let index = 0;
const box = document.getElementById("chatBox");
const btn = document.getElementById("btn");

/* Floating emojis list */
const emojis = ["🌸","🌼","🎀","🎉","🎂","🍰","✨","🌺"];

function spawnEmoji(){
    let e = document.createElement("div");
    e.className="float";
    e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = Math.random()*100+"vw";
    e.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),7000);
}
setInterval(spawnEmoji,700);

btn.addEventListener("click",()=>{

    if(index < messages.length){

        let bubble = document.createElement("div");
        bubble.className = "chat-bubble";
        bubble.innerText = messages[index];
        box.appendChild(bubble);

        gsap.to(bubble,{opacity:1,y:0,duration:0.5});

        index++;

        if(index === messages.length){
            btn.innerText = "Open Our Story 💞";
            btn.onclick = ()=>{
                window.location.href="story.html";
            };
        }
    }
});
</script>

</body>
</html>
